<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Retro Coastal Town 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: monospace; user-select: none; }
        canvas { display: block; image-rendering: pixelated; }
        
        /* General UI Layer */
        #ui-layer { position: absolute; top: 10px; left: 10px; color: #ffff00; text-shadow: 1px 1px 0 #000; pointer-events: none; z-index: 10; }
        .instruction { color: #fff; font-size: 12px; margin-top: 5px; }
        
        /* Game Log / Chat Box */
        #chat-box { position: absolute; bottom: 10px; left: 10px; width: 300px; height: 100px; background: rgba(62, 53, 41, 0.85); border: 2px solid #5c4e3c; color: #fff; font-size: 12px; overflow-y: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 5px; pointer-events: none; text-shadow: 1px 1px 0 #000; z-index: 10;}
        .log-msg { margin: 2px 0; }
        
        /* Tool Toggle Icon */
        #tool-toggle { position: absolute; right: 10px; bottom: 60px; width: 140px; height: 40px; background: #3e3529; border: 2px solid #5c4e3c; color: #fff; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 20; font-size: 14px; font-weight: bold; box-shadow: 2px 2px 0px rgba(0,0,0,0.5); }
        #tool-toggle:hover { background: #4e4539; }
        #tool-toggle:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px rgba(0,0,0,0.5); }

        /* Inventory Toggle Icon */
        #inv-toggle { position: absolute; right: 10px; top: 10px; width: 44px; height: 44px; background: #3e3529; border: 2px solid #5c4e3c; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 20; font-size: 24px; box-shadow: 2px 2px 0px rgba(0,0,0,0.5); }
        #inv-toggle:hover { background: #4e4539; }
        #inv-toggle:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px rgba(0,0,0,0.5); }

        /* Inventory System */
        #inventory { position: absolute; right: 10px; top: 60px; width: 196px; background: #3e3529; border: 2px solid #5c4e3c; padding: 4px; display: none; grid-template-columns: repeat(4, 1fr); gap: 2px; z-index: 15; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .inv-slot { width: 46px; height: 36px; background: #2a231b; border: 1px inset #5c4e3c; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .inv-slot:hover { background: #3a332b; }
        
        /* Items CSS icons */
        .item-icon { pointer-events: none; }
        .item-berries { width: 20px; height: 20px; border-radius: 50%; background: #ff2a2a; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.5); } 
        .item-shell { width: 22px; height: 18px; border-radius: 40% 60% 50% 50%; background: radial-gradient(circle, #ffccbb, #eebbaa); box-shadow: inset -2px -2px 3px rgba(0,0,0,0.4); }
        .item-rod { width: 4px; height: 26px; border-radius: 2px; background: #8b4513; transform: rotate(45deg); box-shadow: 1px 1px 1px rgba(0,0,0,0.5); }
        .item-fish { width: 24px; height: 14px; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; background: linear-gradient(to bottom, #4682b4, #87cefa); box-shadow: inset -1px -2px 2px rgba(0,0,0,0.3); }
        .item-shovel { width: 6px; height: 22px; border-radius: 2px; background: #8b4513; position: relative; box-shadow: 1px 1px 1px rgba(0,0,0,0.5); transform: rotate(15deg); }
        .item-shovel::before { content: ''; position: absolute; bottom: 100%; left: -4px; width: 14px; height: 12px; background: #a0a0a0; border-radius: 4px 4px 10px 10px; box-shadow: inset -1px -1px 2px rgba(0,0,0,0.3); }

        /* Context Menu */
        #context-menu { position: absolute; background: #d0c8b0; border: 1px solid #000; display: none; flex-direction: column; min-width: 120px; font-family: sans-serif; font-size: 14px; z-index: 100; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .ctx-item { padding: 8px 10px; cursor: pointer; color: black; border-bottom: 1px solid #aaa; font-weight: bold; }
        .ctx-item:last-child { border-bottom: none; }
        .ctx-item:hover { background: #e8e2d0; }
        .ctx-cancel { color: #880000; }

        /* Dialogue Box */
        #dialogue-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 450px; height: 130px; background: #e6d8b3; border: 4px solid #5c4e3c; display: none; flex-direction: column; align-items: center; justify-content: center; font-family: 'Georgia', serif; color: #000; z-index: 100; cursor: pointer; box-shadow: inset 0 0 15px rgba(0,0,0,0.4), 4px 4px 8px rgba(0,0,0,0.6); border-radius: 4px; }
        #d-speaker { font-weight: bold; font-size: 18px; margin-top: 10px; color: #3e1b04;}
        #d-text { font-size: 16px; text-align: center; padding: 0 20px; flex-grow: 1; display: flex; align-items: center; }
        #d-continue { font-size: 14px; color: #000080; animation: blink 1.5s infinite; margin-bottom: 10px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Fade Transition Overlay */
        #fade-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in-out; z-index: 1000; }

        @media (max-width: 600px) {
            #dialogue-box { width: 90%; bottom: 120px; } 
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="fade-overlay"></div>

    <div id="ui-layer">
        <div id="level-display">Level: 0 (Ground)</div>
        <div class="instruction">Tap Ground/Pavement: Walk</div>
        <div class="instruction">Tap Doors: Open/Close</div>
        <div class="instruction">Tap NPCs/Items: Interact</div>
    </div>

    <div id="inv-toggle" title="Toggle Inventory">🎒</div>
    <div id="inventory"></div>
    <div id="tool-toggle">👟 Mode: Walk</div>
    <div id="context-menu"></div>

    <div id="dialogue-box" onclick="continueDialogue()">
        <div id="d-speaker">Speaker Name</div>
        <div id="d-text">Dialogue text goes here...</div>
        <div id="d-continue">Click here to continue</div>
    </div>

    <div id="chat-box">
        <div class="log-msg">Welcome to the Coastal Town.</div>
        <div class="log-msg">There is a Shovel nearby...</div>
    </div>

<script>
    // --- 1. ENGINE CONFIGURATION & CONSTANTS ---
    const TILE_SIZE = 1;
    const GRID_SIZE = 40; 
    const TICK_RATE = 0.5;
    
    const LEVELS = {
        '-1': { h: -10, bg: 0x000000, name: "Cellar" },
        '0':  { h: 0,   bg: 0x87CEEB, name: "Ground" },
        '2':  { h: 0,   bg: 0x4fc3f7, name: "Island" }
    };

    let currentLevel = '0'; 

    // --- 2. THREE.JS SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(LEVELS['0'].bg); 

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(0.5);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // --- 3. ENVIRONMENT DATA & TERRAIN GENERATION ---
    const levelGroups = { '-1': new THREE.Group(), '0': new THREE.Group(), '2': new THREE.Group() };
    scene.add(levelGroups['-1']); scene.add(levelGroups['0']); scene.add(levelGroups['2']);
    
    const walkables = { '-1': [], '0': [], '2': [] };
    const interactables = []; 
    const roofZones = [];
    const doors = [];

    const unwalkables = { '-1': [], '0': [], '2': [] };
    const pathTiles = [];
    
    // Define Paths (Pavements)
    function addPath(x1, y1, x2, y2) {
        for(let x=x1; x<=x2; x++) {
            for(let y=y1; y<=y2; y++) {
                if(!pathTiles.some(t => t.x===x && t.y===y)) pathTiles.push({x,y});
            }
        }
    }
    
    addPath(7, 12, 30, 14); // Main Avenue
    addPath(11, 10, 11, 11); // To Bob's
    addPath(27, 10, 27, 11); // To Alice's
    addPath(27, 15, 27, 16); // To Charlie's
    addPath(14, 15, 16, 17); // To Temple Plaza
    addPath(5, 12, 6, 14);   // Towards Beach
    
    // Add deep water tiles to unwalkables for level 0
    for(let x=0; x<4; x++) {
        for(let y=0; y<=GRID_SIZE; y++) unwalkables['0'].push({x: x, y: y});
    }

    const vHeights = {
        '0': Array.from({length: GRID_SIZE + 1}, () => new Float32Array(GRID_SIZE + 1).fill(0)),
        '2': Array.from({length: GRID_SIZE + 1}, () => new Float32Array(GRID_SIZE + 1).fill(-0.5))
    };
    
    // Level 0 Height Map
    for(let x=0; x<=GRID_SIZE; x++){
        for(let y=0; y<=GRID_SIZE; y++){
            if (x < 4) {
                vHeights['0'][x][y] = -0.5; // Deep water dip
            } else if (x < 6) {
                vHeights['0'][x][y] = -0.1; // Beach slope
            } else if (x > 32) {
                vHeights['0'][x][y] = (x - 32) * 0.4; // Eastern Hills
            } else {
                vHeights['0'][x][y] = 0.1; // Flat town area
            }
        }
    }
    
    // Level 2 (Island) Height Map & Unwalkables
    for(let x=0; x<=GRID_SIZE; x++){
        for(let y=0; y<=GRID_SIZE; y++){
            const dist = Math.sqrt(Math.pow(x-20, 2) + Math.pow(y-20, 2));
            if (dist < 4) {
                vHeights['2'][x][y] = 0.2 + (Math.sin(x)*Math.cos(y))*0.1; // Island center
            } else if (dist < 7) {
                vHeights['2'][x][y] = -0.1; // Island Beach
            }
        }
    }
    for(let x=0; x<GRID_SIZE; x++){
        for(let y=0; y<GRID_SIZE; y++){
            const dist = Math.sqrt(Math.pow(x-20, 2) + Math.pow(y-20, 2));
            if (dist >= 6) unwalkables['2'].push({x, y});
        }
    }

    const floorHeights = {};
    function setFloorHeight(x, y, h, level = '0') { floorHeights[`${level},${x},${y}`] = h; }
    
    function getTileCenterHeight(x, y, level) {
        if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return 0;
        if (!vHeights[level]) return 0;
        return (vHeights[level][x][y] + vHeights[level][x+1][y] + vHeights[level][x][y+1] + vHeights[level][x+1][y+1]) / 4;
    }

    function getWalkableHeight(x, y, level) {
        if (level === '-1') return LEVELS[level].h;
        if (floorHeights[`${level},${x},${y}`] !== undefined) return floorHeights[`${level},${x},${y}`];
        return getTileCenterHeight(x, y, level);
    }

    function getGridWorldPos(gridX, gridY, level = '0') {
        const h = getWalkableHeight(gridX, gridY, level);
        return { x: gridX * TILE_SIZE, y: h, z: gridY * TILE_SIZE };
    }

    function buildTerrain(level) {
        const terrainGeo = new THREE.BufferGeometry();
        const verts = [];
        const colors = [];
        
        const cGrass = new THREE.Color(0x4a6b3f);
        const cSand = new THREE.Color(0xeaddb2);
        const cSteep = new THREE.Color(0x3a5b2f); 
        const cPave = new THREE.Color(0x909497); 
        
        for(let x=0; x<GRID_SIZE; x++) {
            for(let y=0; y<GRID_SIZE; y++) {
                let hBL = vHeights[level][x][y];
                let hBR = vHeights[level][x+1][y];
                let hTL = vHeights[level][x][y+1];
                let hTR = vHeights[level][x+1][y+1];
                
                let slopeDiff = Math.max(Math.abs(hBL-hBR), Math.abs(hTL-hTR), Math.abs(hBL-hTL));
                let isPath = pathTiles.some(p => p.x === x && p.y === y);
                
                let color;
                if (level === '0') {
                    if (x < 5 || getTileCenterHeight(x, y, level) < 0) color = cSand; 
                    else if (isPath) color = cPave;
                    else color = (slopeDiff > 0.8 ? cSteep : cGrass);
                } else if (level === '2') {
                    const dist = Math.sqrt(Math.pow(x-20, 2) + Math.pow(y-20, 2));
                    if (dist > 4.5 || getTileCenterHeight(x, y, level) < 0) color = cSand;
                    else color = cGrass;
                }

                let vx = x - 0.5; 
                let vy = y - 0.5;

                verts.push(vx, hBL, vy,  vx, hTL, vy+1,  vx+1, hBR, vy);
                colors.push(color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b);
                
                verts.push(vx+1, hBR, vy,  vx, hTL, vy+1,  vx+1, hTR, vy+1);
                colors.push(color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b);
            }
        }
        
        terrainGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
        terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        terrainGeo.computeVertexNormals();
        
        const terrainMat = new THREE.MeshLambertMaterial({ vertexColors: true, flatShading: true, side: THREE.DoubleSide });
        const terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
        terrainMesh.name = `terrain_${level}`; // Identified for targeted removal later
        
        levelGroups[level].add(terrainMesh);
        walkables[level].push(terrainMesh);
    }
    
    buildTerrain('0');
    buildTerrain('2');

    // --- TERRAFORMING LOGIC ---
    function rebuildTerrainMesh(level) {
        const group = levelGroups[level];
        const oldMesh = group.children.find(c => c.name === `terrain_${level}`);
        if (oldMesh) {
            group.remove(oldMesh);
            walkables[level] = walkables[level].filter(m => m !== oldMesh);
            oldMesh.geometry.dispose();
            if (oldMesh.material) oldMesh.material.dispose();
        }
        buildTerrain(level);
    }

    function isTileProtected(x, y, level) {
        if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return true; // Bounds
        if (floorHeights[`${level},${x},${y}`] !== undefined) return true; // Buildings
        if (level === '0' && x < 4) return true; // Original Deep water bounds
        if (pathTiles.some(p => p.x === x && p.y === y)) return true; // Pavements
        if (unwalkables[level].some(t => t.x === x && t.y === y)) return true; // Trees/Objects
        return false;
    }

    function canModifyVertex(vx, vy, level) {
        if (vx <= 0 || vx >= GRID_SIZE || vy <= 0 || vy >= GRID_SIZE) return false;
        // Vertex is safe only if ALL 4 connected tiles are unprotected
        if (isTileProtected(vx, vy, level)) return false;
        if (isTileProtected(vx - 1, vy, level)) return false;
        if (isTileProtected(vx, vy - 1, level)) return false;
        if (isTileProtected(vx - 1, vy - 1, level)) return false;
        return true;
    }

    function terraformTile(gridX, gridY, level, amount) {
        if (level === '-1') { addLogMessage("You can't dig in the cellar."); return; }
        
        const corners = [
            { vx: gridX, vy: gridY }, { vx: gridX + 1, vy: gridY },
            { vx: gridX, vy: gridY + 1 }, { vx: gridX + 1, vy: gridY + 1 }
        ];

        const MIN_HEIGHT = level === '0' ? -0.8 : -0.5;
        const MAX_HEIGHT = level === '0' ? 1.5 : 1.0;
        
        let canModifyAll = true;
        corners.forEach(c => {
            if (!canModifyVertex(c.vx, c.vy, level)) canModifyAll = false;
            else {
                const currentH = vHeights[level][c.vx][c.vy];
                if (currentH + amount < MIN_HEIGHT || currentH + amount > MAX_HEIGHT) canModifyAll = false;
            }
        });

        if (!canModifyAll) {
            addLogMessage("The ground here cannot be safely modified.");
            return;
        }

        corners.forEach(c => { vHeights[level][c.vx][c.vy] += amount; });

        rebuildTerrainMesh(level);
        addLogMessage(amount > 0 ? "You raised the earth." : "You dug a hole.");
        
        // Ensure player snaps to new height if they modify the tile they stand on
        if (playerGridX === gridX && playerGridY === gridY) {
            player.position.y = getWalkableHeight(playerGridX, playerGridY, level);
        }
    }


    // --- WATER MESHES ---
    let waterMeshes = [];
    function buildWater() {
        const waterMat = new THREE.MeshLambertMaterial({ color: 0x1e90ff, transparent: true, opacity: 0.75, flatShading: true });
        
        // Level 0 Water: Now covers the entire map beneath the terrain so dug holes fill with water!
        const waterGeo0 = new THREE.PlaneGeometry(GRID_SIZE * TILE_SIZE, GRID_SIZE * TILE_SIZE, 16, 16);
        const water0 = new THREE.Mesh(waterGeo0, waterMat);
        water0.rotation.x = -Math.PI / 2;
        water0.position.set((GRID_SIZE / 2) * TILE_SIZE - 0.5, -0.2, (GRID_SIZE / 2) * TILE_SIZE - 0.5);
        water0.userData = { isWater: true, sourceLevel: '0' };
        
        levelGroups['0'].add(water0);
        interactables.push(water0);
        waterMeshes.push(water0);

        // Level 2 Water
        const waterGeo2 = new THREE.PlaneGeometry(GRID_SIZE * TILE_SIZE, GRID_SIZE * TILE_SIZE, 16, 16);
        const water2 = new THREE.Mesh(waterGeo2, waterMat);
        water2.rotation.x = -Math.PI / 2;
        water2.position.set((GRID_SIZE / 2) * TILE_SIZE - 0.5, -0.2, (GRID_SIZE / 2) * TILE_SIZE - 0.5);
        water2.userData = { isWater: true, sourceLevel: '2' };

        levelGroups['2'].add(water2);
        interactables.push(water2);
        waterMeshes.push(water2);
    }
    buildWater();

    // --- ARCHITECTURE & TOWN ---
    const allWalls = { '-1': [], '0': [], '2': [] };

    function buildFloorArea(x1, y1, x2, y2, level, color, group, explicitHeight = null) {
        for(let x=x1; x<=x2; x++) {
            for(let y=y1; y<=y2; y++) {
                if (level !== '-1' && explicitHeight !== null) setFloorHeight(x, y, explicitHeight, level);
                const actualH = explicitHeight !== null ? explicitHeight : LEVELS[level].h;

                const geo = new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE);
                const mat = new THREE.MeshLambertMaterial({ color: color });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.rotation.x = -Math.PI / 2;
                mesh.position.set(x * TILE_SIZE, actualH + 0.015, y * TILE_SIZE); 
                group.add(mesh);
                walkables[level].push(mesh);
            }
        }
    }

    function buildWall(w, level, height = 1.6) {
        let wallColor = 0x808080;
        if (w.type === 'white') wallColor = 0xeae6df;
        if (w.type === 'stone') wallColor = 0xcac7bd;
        
        let actualHeight = height;
        let centerY = LEVELS[level].h + height/2;
        
        if (level === '0' || level === '2') {
            const baseH = getWalkableHeight(w.x, w.y, level);
            const foundationDepth = 4.0; 
            actualHeight = height + foundationDepth;
            centerY = baseH + height/2 - foundationDepth/2;
        }

        const thickness = 0.12;
        const length = TILE_SIZE + thickness; 
        const geo = new THREE.BoxGeometry(
            (w.dir === 'N' || w.dir === 'S') ? length : thickness, actualHeight,
            (w.dir === 'E' || w.dir === 'W') ? length : thickness
        );
        const mat = new THREE.MeshLambertMaterial({ color: wallColor, flatShading: true });
        const mesh = new THREE.Mesh(geo, mat);

        let posX = w.x * TILE_SIZE;
        let posZ = w.y * TILE_SIZE;
        if (w.dir === 'N') posZ -= TILE_SIZE/2;
        if (w.dir === 'S') posZ += TILE_SIZE/2;
        if (w.dir === 'E') posX += TILE_SIZE/2;
        if (w.dir === 'W') posX -= TILE_SIZE/2;

        mesh.position.set(posX, centerY, posZ);
        levelGroups[level].add(mesh);
    }

    function createDoor(x, y, dir, level) {
        const doorGroup = new THREE.Group();
        
        const height = 1.4;
        const thickness = 0.08;
        const length = TILE_SIZE;
        const mat = new THREE.MeshLambertMaterial({ color: 0x6b4c3a }); 
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(length, height, thickness), mat);
        
        mesh.position.set(length/2, height/2, 0); 
        doorGroup.add(mesh);

        let posX = x * TILE_SIZE;
        let posZ = y * TILE_SIZE;
        let baseY = getWalkableHeight(x, y, level); 
        
        if (dir === 'N') { posX -= TILE_SIZE/2; posZ -= TILE_SIZE/2; }
        if (dir === 'S') { posX -= TILE_SIZE/2; posZ += TILE_SIZE/2; }
        if (dir === 'E') { posX += TILE_SIZE/2; posZ -= TILE_SIZE/2; doorGroup.rotation.y = -Math.PI/2; }
        if (dir === 'W') { posX -= TILE_SIZE/2; posZ -= TILE_SIZE/2; doorGroup.rotation.y = -Math.PI/2; }

        doorGroup.position.set(posX, baseY, posZ);

        const hitBox = new THREE.Mesh(new THREE.BoxGeometry(TILE_SIZE, height, TILE_SIZE*0.5), new THREE.MeshBasicMaterial({visible:false}));
        hitBox.position.set(length/2, height/2, 0);
        doorGroup.add(hitBox);

        levelGroups[level].add(doorGroup);

        const doorObj = { x, y, dir, isOpen: false, group: doorGroup, level, baseRot: doorGroup.rotation.y };
        doors.push(doorObj);

        hitBox.userData = { isDoor: true, doorObj: doorObj, sourceLevel: level, interactX: x, interactY: y };
        interactables.push(hitBox);
    }

    function createRoof(x1, y1, x2, y2, level, houseName, colorHex = 0xb53c3c, yOffset = 1.25, height = 2.5) {
        const width = (x2 - x1 + 1) * TILE_SIZE;
        const depth = (y2 - y1 + 1) * TILE_SIZE;
        
        const geo = new THREE.ConeGeometry(Math.max(width, depth) * 0.75, height, 4);
        const mat = new THREE.MeshLambertMaterial({ color: colorHex, flatShading: true }); 
        const mesh = new THREE.Mesh(geo, mat);

        const centerX = ((x1 + x2) / 2) * TILE_SIZE;
        const centerZ = ((y1 + y2) / 2) * TILE_SIZE;
        const baseY = getWalkableHeight(x1, y1, level) + 1.6; 

        mesh.position.set(centerX, baseY + yOffset, centerZ);
        mesh.rotation.y = Math.PI / 4; 
        
        levelGroups[level].add(mesh);

        roofZones.push({
            minX: x1, maxX: x2, minY: y1, maxY: y2,
            mesh: mesh, level: level
        });
    }

    function buildHouse(name, x1, y1, x2, y2, doorsDef, innerWalls, level='0') {
        buildFloorArea(x1, y1, x2, y2, level, 0x887766, levelGroups[level], 0.15); 
        
        for(let x = x1; x <= x2; x++) {
            if (!doorsDef.some(d => d.x === x && d.y === y1 && d.dir === 'N')) allWalls[level].push({x: x, y: y1, dir: 'N', type:'white'});
            if (!doorsDef.some(d => d.x === x && d.y === y2 && d.dir === 'S')) allWalls[level].push({x: x, y: y2, dir: 'S', type:'white'});
        }
        for(let y = y1; y <= y2; y++) {
            if (!doorsDef.some(d => d.x === x1 && d.y === y && d.dir === 'W')) allWalls[level].push({x: x1, y: y, dir: 'W', type:'white'});
            if (!doorsDef.some(d => d.x === x2 && d.y === y && d.dir === 'E')) allWalls[level].push({x: x2, y: y, dir: 'E', type:'white'});
        }

        innerWalls.forEach(w => allWalls[level].push({...w, type:'white'}));
        doorsDef.forEach(d => createDoor(d.x, d.y, d.dir, level));
        createRoof(x1, y1, x2, y2, level, name);
    }

    function buildTemple(name, x1, y1, x2, y2, level) {
        for(let x=x1; x<=x2; x++){
            for(let y=y1; y<=y2; y++){
                let isDark = (x+y)%2 === 0;
                buildFloorArea(x, y, x, y, level, isDark ? 0xdddddd : 0x555566, levelGroups[level], 0.15);
            }
        }
        for(let x = x1; x <= x2; x++) {
            if (!(x >= 14 && x <= 16 && y1 === 18)) allWalls[level].push({x: x, y: y1, dir: 'N', type:'stone'});
            allWalls[level].push({x: x, y: y2, dir: 'S', type:'stone'});
        }
        for(let y = y1; y <= y2; y++) {
            allWalls[level].push({x: x1, y: y, dir: 'W', type:'stone'});
            allWalls[level].push({x: x2, y: y, dir: 'E', type:'stone'});
        }

        const colMat = new THREE.MeshLambertMaterial({color: 0xffffff});
        const colGeo = new THREE.CylinderGeometry(0.3, 0.3, 3.2, 8);
        for(let cy=20; cy<=24; cy+=2) {
            for(let cx of [12, 18]) {
                const col = new THREE.Mesh(colGeo, colMat);
                let pos = getGridWorldPos(cx, cy, level);
                col.position.set(pos.x, pos.y + 1.6, pos.z);
                levelGroups[level].add(col);
                unwalkables[level].push({x: cx, y: cy});
            }
        }

        const archMat = new THREE.MeshLambertMaterial({color: 0xcac7bd});
        const baseY = getWalkableHeight(15, 18, level);
        
        const archL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 2.5, 0.4), archMat);

        createRoof(x1, y1, x2, y2, level, name, 0x008080, 2.0, 4.0); 
    }

    function createPalmTree(x, z, level) {
        const treeGroup = new THREE.Group();
        const trunkMat = new THREE.MeshLambertMaterial({ color: 0x8b5a2b, flatShading: true });
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 1.4, 5), trunkMat);
        trunk.position.y = 0.7;
        trunk.rotation.z = 0.15; 
        treeGroup.add(trunk);
        
        const leafMat = new THREE.MeshLambertMaterial({ color: 0x32cd32, flatShading: true, side: THREE.DoubleSide });
        for(let i=0; i<5; i++) {
            const leaf = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 1.5), leafMat);
            leaf.position.y = 1.4;
            leaf.position.x = 0.1; 
            leaf.rotation.x = -Math.PI / 3; 
            leaf.rotation.y = (i / 5) * Math.PI * 2;
            leaf.translateZ(0.4);
            treeGroup.add(leaf);
        }
        
        const pos = getGridWorldPos(x, z, level);
        treeGroup.position.set(pos.x, pos.y, pos.z);
        treeGroup.rotation.y = Math.random() * Math.PI; 
        levelGroups[level].add(treeGroup);
        unwalkables[level].push({x, y: z});
    }

    function spawnGroundItem(type, x, y, level) {
        const def = ITEM_DEFS[type];
        let mesh;
        if (type === 'rod') {
            mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.8), new THREE.MeshLambertMaterial({color: def.color}));
            mesh.rotation.z = Math.PI / 4; mesh.position.y = 0.4;
        } else if (type === 'shovel') {
            mesh = new THREE.Group();
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.8), new THREE.MeshLambertMaterial({color: 0x8b4513}));
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.3, 0.02), new THREE.MeshLambertMaterial({color: def.color}));
            head.position.y = -0.4;
            mesh.add(handle); mesh.add(head);
            mesh.rotation.z = Math.PI / 4; mesh.position.y = 0.4;
        } else if (type === 'shell') {
            mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(0.15), new THREE.MeshLambertMaterial({color: def.color}));
            mesh.position.y = 0.1;
        } else {
            mesh = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshLambertMaterial({ color: def.color }));
            mesh.position.y = 0.2;
        }
        
        const pos = getGridWorldPos(x, y, level);
        mesh.position.x = pos.x; mesh.position.z = pos.z; mesh.position.y += pos.y;
        
        const hitBox = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshBasicMaterial({visible: false}));
        hitBox.position.copy(mesh.position);
        hitBox.userData = { isItem: true, sourceLevel: level, type: type, interactX: x, interactY: y, linkedMesh: mesh };
        
        levelGroups[level].add(mesh); levelGroups[level].add(hitBox);
        groundItems.push({ mesh: mesh, hitBox: hitBox });
        interactables.push(hitBox);
    }

    function handleInventoryClick(event, index) {
        if(!inventory[index]) return;
        const itemType = inventory[index];
        const def = ITEM_DEFS[itemType];

        let menuX = event.clientX - 10;
        let menuY = event.clientY - 10;
        if (menuX + 130 > window.innerWidth) menuX = window.innerWidth - 130;

        ctxMenu.innerHTML = ''; ctxMenu.style.display = 'flex';
        ctxMenu.style.left = menuX + 'px'; ctxMenu.style.top = menuY + 'px';

        const createBtn = (text, className, onClickLogic) => {
            const btn = document.createElement('div');
            btn.className = `ctx-item ${className}`;
            btn.innerText = text;
            btn.addEventListener('pointerdown', (e) => { e.stopPropagation(); onClickLogic(); ctxMenu.style.display = 'none'; });
            return btn;
        };

        if (def.type === 'food') {
            ctxMenu.appendChild(createBtn(`Eat ${def.name}`, '', () => { inventory[index] = null; addLogMessage(`You eat the ${def.name}.`); renderInventory(); }));
        } else if (def.type === 'misc' && itemType === 'shell') {
            ctxMenu.appendChild(createBtn(`Listen to Shell`, '', () => { addLogMessage(`"You hear the gentle roar of the ocean..."`); }));
        } else if (def.type === 'tool') {
            if (itemType === 'rod') ctxMenu.appendChild(createBtn(`Examine ${def.name}`, '', () => { addLogMessage(`A sturdy fishing rod. Used on water.`); }));
            if (itemType === 'shovel') ctxMenu.appendChild(createBtn(`Examine ${def.name}`, '', () => { addLogMessage(`Use this to dig holes and raise the earth.`); }));
        }
        
        ctxMenu.appendChild(createBtn(`Drop ${def.name}`, '', () => {
            inventory[index] = null; spawnGroundItem(itemType, playerGridX, playerGridY, currentLevel);
            addLogMessage(`You drop the ${def.name}.`); renderInventory();
        }));
        ctxMenu.appendChild(createBtn(`Cancel`, 'ctx-cancel', () => {}));
    }

    function executePickupItem(hitBox) {
        const emptySlot = inventory.findIndex(i => i === null);
        if (emptySlot === -1) { addLogMessage("Your inventory is full!"); return; }
        const type = hitBox.userData.type;
        const linkedMesh = hitBox.userData.linkedMesh;
        inventory[emptySlot] = type;
        addLogMessage(`You pick up ${ITEM_DEFS[type].name}.`);
        renderInventory();

        levelGroups[hitBox.userData.sourceLevel].remove(hitBox);
        levelGroups[hitBox.userData.sourceLevel].remove(linkedMesh);
        
        const interIndex = interactables.indexOf(hitBox);
        if (interIndex > -1) interactables.splice(interIndex, 1);
        const gIdx = groundItems.findIndex(g => g.hitBox === hitBox);
        if (gIdx > -1) groundItems.splice(gIdx, 1);
    }

    let targetMovePos = new THREE.Vector3();

    const startPosWorld = getGridWorldPos(playerGridX, playerGridY, '0');
    player.position.set(startPosWorld.x, startPosWorld.y, startPosWorld.z);

    function updateLevelVisibility(lvl) {
        document.getElementById('level-display').innerText = `Level: ${lvl} (${LEVELS[lvl].name})`;
        scene.background = new THREE.Color(LEVELS[lvl].bg);
        Object.keys(levelGroups).forEach(key => { levelGroups[key].visible = (key === lvl); });
    }
    updateLevelVisibility(currentLevel);

    function triggerFadeTransition(callback) {
        const overlay = document.getElementById('fade-overlay');
        overlay.style.opacity = 1;
        pathQueue = []; isMoving = false;
        setTimeout(() => { callback(); overlay.style.opacity = 0; }, 800);
    }

    function executeLevelChange(newLevel, spawnX = null, spawnY = null) {
        currentLevel = newLevel.toString();
        if (spawnX !== null) playerGridX = spawnX;
        if (spawnY !== null) playerGridY = spawnY;

        updateLevelVisibility(currentLevel);
        const startPos = getGridWorldPos(playerGridX, playerGridY, currentLevel);
        player.position.set(startPos.x, startPos.y, startPos.z);
        targetMovePos.copy(player.position); 
        pathQueue = []; 
        addLogMessage(newLevel === '2' ? "You arrive at the Island." : "You arrive at a new area.");
    }

    function executeFishing() {
        addLogMessage("You cast your line into the water...");
        player.rotation.y = Math.PI / 2; // Face water
        setTimeout(() => {
            if (Math.random() > 0.4) {
                const emptySlot = inventory.findIndex(i => i === null);
                if (emptySlot !== -1) { inventory[emptySlot] = 'fish'; renderInventory(); addLogMessage("You caught a Raw Fish!"); } 
                else { addLogMessage("You caught a fish, but your inventory is full!"); }
            } else { addLogMessage("The fish got away."); }
        }, 2000);
    }

    let cameraYaw = Math.PI / 4; 
    let cameraPitch = Math.PI / 3.5; 
    let cameraDistance = 14;
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = true; });
    window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = false; });

    function updateCamera() {
        if (keys.ArrowLeft) cameraYaw += 0.05;
        if (keys.ArrowRight) cameraYaw -= 0.05;
        if (keys.ArrowUp) cameraPitch = Math.max(0.1, cameraPitch - 0.05);
        if (keys.ArrowDown) cameraPitch = Math.min(Math.PI / 2 - 0.1, cameraPitch + 0.05);

        camera.position.set(
            player.position.x + cameraDistance * Math.sin(cameraYaw) * Math.cos(cameraPitch),
            player.position.y + cameraDistance * Math.sin(cameraPitch),
            player.position.z + cameraDistance * Math.cos(cameraYaw) * Math.cos(cameraPitch)
        );
        camera.lookAt(player.position.x, player.position.y + 0.5, player.position.z);
    }

    // --- 7. PATHFINDING & LINE OF SIGHT ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clickMarker = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.8), new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true }));
    clickMarker.visible = false;
    scene.add(clickMarker);

    function hasWallBlocking(fromX, fromY, toX, toY, level) {
        const activeWalls = allWalls[level] || [];
        const closedDoors = doors.filter(d => d.level === level && !d.isOpen);
        const combined = [...activeWalls, ...closedDoors];

        if (toY < fromY) return combined.some(w => (w.x === fromX && w.y === fromY && w.dir === 'N') || (w.x === toX && w.y === toY && w.dir === 'S'));
        if (toY > fromY) return combined.some(w => (w.x === fromX && w.y === fromY && w.dir === 'S') || (w.x === toX && w.y === toY && w.dir === 'N'));
        if (toX < fromX) return combined.some(w => (w.x === fromX && w.y === fromY && w.dir === 'W') || (w.x === toX && w.y === toY && w.dir === 'E'));
        if (toX > fromX) return combined.some(w => (w.x === fromX && w.y === fromY && w.dir === 'E') || (w.x === toX && w.y === toY && w.dir === 'W'));
        return false;
    }

    function checkLineOfSight(cx, cy, nx, ny, level) {
        if (cx === nx && cy === ny) return true;
        let dx = nx - cx; let dy = ny - cy;
        
        if (Math.abs(dx) === 1 && Math.abs(dy) === 0) return !hasWallBlocking(cx, cy, nx, ny, level);
        else if (Math.abs(dx) === 0 && Math.abs(dy) === 1) return !hasWallBlocking(cx, cy, nx, ny, level);
        else if (Math.abs(dx) === 1 && Math.abs(dy) === 1) {
            if (hasWallBlocking(cx, cy, cx + dx, cy, level) || hasWallBlocking(cx, cy, cx, cy + dy, level)) return false;
            if (hasWallBlocking(nx, ny, cx + dx, cy, level) || hasWallBlocking(nx, ny, cx, cy + dy, level)) return false;
            return true;
        }
        return false;
    }

    function canMove(cx, cy, nx, ny, level) {
        if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) return false;
        if (level === '-1' && (nx < 9 || nx > 11 || ny < 7 || ny > 9)) return false;
        if (unwalkables[level].some(t => t.x === nx && t.y === ny)) return false;

        if (level !== '-1') {
            const h1 = getWalkableHeight(cx, cy, level);
            const h2 = getWalkableHeight(nx, ny, level);
            if (Math.abs(h1 - h2) > 0.9) return false; 
        }

        let dx = nx - cx; let dy = ny - cy;
        if (Math.abs(dx) === 1 && Math.abs(dy) === 1) return checkLineOfSight(cx, cy, nx, ny, level);
        else return !hasWallBlocking(cx, cy, nx, ny, level);
    }

    function findPath(startX, startY, endX, endY, level, stopAdjacent = false) {
        if (endX < 0 || endX >= GRID_SIZE || endY < 0 || endY >= GRID_SIZE) return [];
        if (level === '-1' && (endX < 9 || endX > 11 || endY < 7 || endY > 9)) return [];
        if (!stopAdjacent && unwalkables[level].some(t => t.x === endX && t.y === endY)) return [];

        const startDist = Math.max(Math.abs(startX - endX), Math.abs(startY - endY));
        if (stopAdjacent && startDist <= 1 && checkLineOfSight(startX, startY, endX, endY, level)) return [];
        if (!stopAdjacent && startDist === 0) return [];

        const openSet = [{ x: startX, y: startY, g: 0, h: 0, f: 0, parent: null }];
        const closedSet = [];

        while (openSet.length > 0) {
            openSet.sort((a, b) => a.f - b.f);
            const current = openSet.shift();

            const dist = Math.max(Math.abs(current.x - endX), Math.abs(current.y - endY));
            let isWin = false;
            
            if (stopAdjacent) { if (dist <= 1 && checkLineOfSight(current.x, current.y, endX, endY, level)) isWin = true; } 
            else { if (dist === 0) isWin = true; }

            if (isWin) {
                const path = []; let curr = current;
                while (curr.parent) { path.push({ x: curr.x, y: curr.y }); curr = curr.parent; }
                return path.reverse();
            }

            closedSet.push(current);
            
            const neighbors = [
                { x: current.x, y: current.y - 1 }, { x: current.x, y: current.y + 1 },
                { x: current.x - 1, y: current.y }, { x: current.x + 1, y: current.y },
                { x: current.x - 1, y: current.y - 1 }, { x: current.x + 1, y: current.y - 1 },
                { x: current.x - 1, y: current.y + 1 }, { x: current.x + 1, y: current.y + 1 }
            ];

            for (let n of neighbors) {
                if (closedSet.some(c => c.x === n.x && c.y === n.y)) continue;
                if (!canMove(current.x, current.y, n.x, n.y, level)) continue;

                const gScore = current.g + 1; 
                const hScore = Math.max(Math.abs(n.x - endX), Math.abs(n.y - endY)); 

                const existingNode = openSet.find(o => o.x === n.x && o.y === n.y);
                if (!existingNode) {
                    openSet.push({ x: n.x, y: n.y, g: gScore, h: 0, f: gScore + hScore, parent: current });
                } else if (gScore < existingNode.g) {
                    existingNode.g = gScore; existingNode.f = gScore + hScore; existingNode.parent = current;
                }
            }
        }
        return []; 
    }

    window.addEventListener('pointerdown', (event) => {
        ctxMenu.style.display = 'none';

        if (activeDialogue && !event.target.closest('#dialogue-box')) {
            document.getElementById('dialogue-box').style.display = 'none';
            activeDialogue = null;
        }

        if (event.target.closest('#ui-layer') || event.target.closest('#inventory') || event.target.closest('#context-menu') || event.target.closest('#inv-toggle') || event.target.closest('#tool-toggle') || event.target.closest('#chat-box') || event.target.closest('#dialogue-box')) return;

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const activeInteractables = interactables.filter(i => i.userData.sourceLevel === currentLevel);
        const hits = raycaster.intersectObjects([...activeInteractables, ...walkables[currentLevel]]);
        
        if (hits.length > 0) {
            const hit = hits[0]; 
            const data = hit.object.userData;

            if (data && data.isWater) {
                if (!inventory.includes('rod')) { addLogMessage("You need a Fishing Rod to fish."); return; }
                
                // Target the specific walkable tile the user clicked the water from
                const clickX = Math.round(hit.point.x / TILE_SIZE);
                const clickY = Math.round(hit.point.z / TILE_SIZE);
                
                let newPath = findPath(playerGridX, playerGridY, clickX, clickY, currentLevel, true);
                pendingAction = () => executeFishing();
                
                if (newPath.length > 0) pathQueue = newPath;
                else if (Math.max(Math.abs(playerGridX - clickX), Math.abs(playerGridY - clickY)) <= 1) pathQueue = []; 
                else pendingAction = null;
                
                clickMarker.position.set(clickX * TILE_SIZE, -0.1, clickY * TILE_SIZE);
                clickMarker.visible = true; setTimeout(() => clickMarker.visible = false, 300);

            } else if (data && data.isDoor) {
                const t1 = {x: data.doorObj.x, y: data.doorObj.y};
                let t2 = {x: t1.x, y: t1.y};
                if (data.doorObj.dir === 'N') t2.y -= 1;
                if (data.doorObj.dir === 'S') t2.y += 1;
                if (data.doorObj.dir === 'E') t2.x += 1;
                if (data.doorObj.dir === 'W') t2.x -= 1;

                let path1 = findPath(playerGridX, playerGridY, t1.x, t1.y, currentLevel, false);
                let path2 = findPath(playerGridX, playerGridY, t2.x, t2.y, currentLevel, false);
                
                let chosenPath = [];
                if (path1.length === 0 && playerGridX === t1.x && playerGridY === t1.y) chosenPath = [];
                else if (path2.length === 0 && playerGridX === t2.x && playerGridY === t2.y) chosenPath = [];
                else if (path1.length > 0 && path2.length === 0) chosenPath = path1;
                else if (path2.length > 0 && path1.length === 0) chosenPath = path2;
                else if (path1.length > 0 && path2.length > 0) chosenPath = path1.length < path2.length ? path1 : path2;
                else chosenPath = []; 

                pendingAction = () => {
                    const door = data.doorObj;
                    door.isOpen = !door.isOpen;
                    door.group.rotation.y = door.baseRot + (door.isOpen ? Math.PI/2 : 0);
                    addLogMessage(door.isOpen ? "You opened the door." : "You closed the door.");
                };

                if (chosenPath.length > 0) { pathQueue = chosenPath; } 
                else if ((playerGridX === t1.x && playerGridY === t1.y) || (playerGridX === t2.x && playerGridY === t2.y)) { pathQueue = []; } 
                else { pendingAction = null; addLogMessage("You can't reach the door."); }

            } else if (data && (data.isItem || data.isTransition || data.isNPC)) {
                const stopAdjacent = !!data.isNPC || !!data.stopAdjacent;
                let newPath = findPath(playerGridX, playerGridY, data.interactX, data.interactY, currentLevel, stopAdjacent);

                pendingAction = () => {
                    if (data.isItem) executePickupItem(hit.object);
                    else if (data.isTransition) {
                        if (data.useFade) triggerFadeTransition(() => executeLevelChange(data.targetLevel, data.spawnX, data.spawnY));
                        else executeLevelChange(data.targetLevel, data.spawnX, data.spawnY);
                    }
                    else if (data.isNPC) startDialogue(data.npcId);
                };

                if (newPath.length > 0) pathQueue = newPath;
                else {
                    const dist = Math.max(Math.abs(playerGridX - data.interactX), Math.abs(playerGridY - data.interactY));
                    const inRange = stopAdjacent ? (dist <= 1 && checkLineOfSight(playerGridX, playerGridY, data.interactX, data.interactY, currentLevel)) : (dist === 0);
                    if (inRange) pathQueue = []; else pendingAction = null;
                }
            } else {
                // Ground hit & Terraforming Trigger
                const targetGridX = Math.round(hit.point.x / TILE_SIZE);
                const targetGridY = Math.round(hit.point.z / TILE_SIZE);

                clickMarker.position.set(targetGridX * TILE_SIZE, getWalkableHeight(targetGridX, targetGridY, currentLevel) + 0.1, targetGridY * TILE_SIZE);
                clickMarker.visible = true; setTimeout(() => clickMarker.visible = false, 300);

                if (activeTool === 'dig' || activeTool === 'raise') {
                    const amount = activeTool === 'dig' ? -0.2 : 0.2;
                    const newPath = findPath(playerGridX, playerGridY, targetGridX, targetGridY, currentLevel, true);
                    
                    pendingAction = () => {
                        player.lookAt(hit.point.x, player.position.y, hit.point.z);
                        terraformTile(targetGridX, targetGridY, currentLevel, amount);
                    };

                    if (newPath.length > 0) { pathQueue = newPath; }
                    else {
                        const dist = Math.max(Math.abs(playerGridX - targetGridX), Math.abs(playerGridY - targetGridY));
                        if (dist <= 1 && checkLineOfSight(playerGridX, playerGridY, targetGridX, targetGridY, currentLevel)) {
                            pathQueue = []; // In range to terraform
                        } else {
                            pendingAction = null; addLogMessage("Can't reach there.");
                        }
                    }
                } else {
                    // Standard walking
                    const newPath = findPath(playerGridX, playerGridY, targetGridX, targetGridY, currentLevel);
                    if (newPath.length > 0) { pathQueue = newPath; pendingAction = null; } 
                    else if (targetGridX === playerGridX && targetGridY === playerGridY) { pathQueue = []; pendingAction = null; }
                }
            }
        }
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- 8. TICK LOOP & ANIMATION ---
    const clock = new THREE.Clock();
    let time = 0;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        time += delta;

        // Roof Visibility check (inside vs outside)
        roofZones.forEach(zone => {
            if (currentLevel === zone.level && playerGridX >= zone.minX && playerGridX <= zone.maxX && playerGridY >= zone.minY && playerGridY <= zone.maxY) {
                zone.mesh.visible = false;
            } else {
                zone.mesh.visible = true;
            }
        });

        waterMeshes.forEach(wm => {
            if (wm.parent.visible) {
                const positions = wm.geometry.attributes.position;
                for (let i = 0; i < positions.count; i++) {
                    const vx = positions.getX(i); const vy = positions.getY(i);
                    const wave = Math.sin(time * 2 + vx * 2 + vy * 1.5) * 0.1;
                    positions.setZ(i, wave);
                }
                positions.needsUpdate = true;
            }
        });

        currentTickTimer += delta;

        if (currentTickTimer >= TICK_RATE) {
            currentTickTimer = 0; 
            
            if (isMoving) { player.position.copy(targetMovePos); isMoving = false; }

            if (pathQueue.length === 0 && !isMoving && pendingAction) {
                pendingAction(); pendingAction = null; 
            }

            if (pathQueue.length > 0) {
                const nextTile = pathQueue.shift();
                playerGridX = nextTile.x; playerGridY = nextTile.y;

                const nextWorldPos = getGridWorldPos(playerGridX, playerGridY, currentLevel);
                startMovePos.copy(player.position); targetMovePos.copy(nextWorldPos);
                player.lookAt(nextWorldPos.x, player.position.y, nextWorldPos.z);
                isMoving = true;
            }

            npcs.forEach(npc => {
                if (npc.level !== currentLevel) return;

                if (npc.isMoving) { npc.mesh.position.copy(npc.targetPos); npc.isMoving = false; }

                if (npc.pathQueue.length > 0) {
                    const nextTile = npc.pathQueue.shift();
                    npc.gridX = nextTile.x; npc.gridY = nextTile.y;
                    
                    npc.startPos.copy(npc.mesh.position);
                    npc.targetPos.copy(getGridWorldPos(npc.gridX, npc.gridY, npc.level));
                    npc.mesh.lookAt(npc.targetPos.x, npc.mesh.position.y, npc.targetPos.z);
                    npc.isMoving = true;
                    
                    npc.hitbox.userData.interactX = npc.gridX; npc.hitbox.userData.interactY = npc.gridY;
                } else {
                    npc.tickCounter++;
                    if (npc.tickCounter > 6 && Math.random() < 0.4) {
                        npc.tickCounter = 0;
                        let rx = npc.homeX + Math.floor(Math.random()*7)-3;
                        let ry = npc.homeY + Math.floor(Math.random()*7)-3;
                        
                        if (npc.type === 'crab') {
                            rx = Math.random() > 0.5 ? npc.homeX : npc.homeX + 1; 
                            ry = npc.gridY + Math.floor(Math.random()*7)-3;
                        }

                        if (npc.id === 'sage') {
                            rx = Math.max(11, Math.min(19, rx));
                            ry = Math.max(19, Math.min(25, ry));
                        }

                        npc.pathQueue = findPath(npc.gridX, npc.gridY, rx, ry, npc.level, false);
                    }
                }
            });
        }

        const progress = currentTickTimer / TICK_RATE;
        if (isMoving) player.position.lerpVectors(startMovePos, targetMovePos, progress);

        npcs.forEach(npc => {
            if (npc.level === currentLevel && npc.isMoving) npc.mesh.position.lerpVectors(npc.startPos, npc.targetPos, progress);
        });

        updateCamera();
        renderer.render(scene, camera);
    }
    
    animate();

</script>
